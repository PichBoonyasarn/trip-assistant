<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出張アシスタント</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: #0f1923;
      color: #e8ecf0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 640px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .logo {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #5b9bd5;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 40px;
      text-align: center;
    }

    /* Screens */
    .screen {
      width: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .screen.active { display: flex; }

    .question {
      font-size: 18px;
      font-weight: 600;
      color: #c8d8e8;
      text-align: center;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      margin-top: 8px;
    }

    .choice-btn {
      background: #1a2a3a;
      border: 2px solid #2a4060;
      border-radius: 12px;
      padding: 28px 16px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #e8ecf0;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      min-height: 120px;
      justify-content: center;
    }
    .choice-btn:hover {
      background: #1e3550;
      border-color: #5b9bd5;
      transform: translateY(-2px);
    }
    .choice-btn .icon {
      font-size: 32px;
      line-height: 1;
    }
    .choice-btn .sub {
      font-size: 12px;
      font-weight: 400;
      color: #7a9ab8;
      margin-top: 2px;
    }

    /* Back button */
    .back-btn {
      background: none;
      border: none;
      color: #5b9bd5;
      font-size: 14px;
      cursor: pointer;
      padding: 8px 4px;
      margin-top: 4px;
      text-decoration: underline;
    }
    .back-btn:hover { color: #88bce8; }

    /* Loading overlay */
    #loadingScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }
    #loadingScreen.active { display: flex; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #2a4060;
      border-top-color: #5b9bd5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 16px;
      color: #c8d8e8;
    }
    .loading-sub {
      font-size: 13px;
      color: #5a7a9a;
      margin-top: -8px;
    }

    /* Footer hint */
    footer {
      margin-top: 48px;
      font-size: 12px;
      color: #3a5a7a;
      text-align: center;
    }
    footer span { color: #4a7aaa; }

    @media (max-width: 480px) {
      h1 { font-size: 22px; }
      .btn-grid { grid-template-columns: 1fr; }
      .choice-btn { min-height: 80px; padding: 20px 16px; flex-direction: row; gap: 14px; text-align: left; }
      .choice-btn .icon { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Business Trip</div>
    <h1>出張アシスタント</h1>

    <!-- Step 1: trip type -->
    <div class="screen active" id="screen1">
      <p class="question">この出張は？</p>
      <div class="btn-grid">
        <button class="choice-btn" id="btnDayTrip">
          <span class="icon">☀️</span>
          <span>日帰り</span>
          <span class="sub">その日のうちに帰る</span>
        </button>
        <button class="choice-btn" id="btnStayover">
          <span class="icon">🏨</span>
          <span>宿泊あり</span>
          <span class="sub">現地に泊まる</span>
        </button>
      </div>
    </div>

    <!-- Step 2: hotel booked? -->
    <div class="screen" id="screen2">
      <p class="question">ホテルはすでに<br>予約していますか？</p>
      <div class="btn-grid">
        <button class="choice-btn" id="btnBooked">
          <span class="icon">✅</span>
          <span>はい<br>予約済み</span>
          <span class="sub">ホテル情報を入力する</span>
        </button>
        <button class="choice-btn" id="btnNotBooked">
          <span class="icon">🔍</span>
          <span>いいえ<br>これから探す</span>
          <span class="sub">ホテルを検索する</span>
        </button>
      </div>
      <button class="back-btn" id="btnBack">← 前に戻る</button>
    </div>

    <!-- Loading -->
    <div id="loadingScreen">
      <div class="spinner"></div>
      <div class="loading-text">アプリを起動中...</div>
      <div class="loading-sub">初回は最大60秒かかる場合があります</div>
    </div>

    <footer id="footer">
      Electronの場合、<span>Ctrl+Home</span> でこの画面に戻れます
    </footer>
  </div>

  <script>
    let appUrls = null;

    async function getUrls() {
      if (appUrls) return appUrls;
      const res = await fetch('/api/app-urls');
      appUrls = await res.json();
      return appUrls;
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('loadingScreen').classList.remove('active');
      if (id === 'loading') {
        document.getElementById('loadingScreen').classList.add('active');
      } else {
        const el = document.getElementById(id);
        if (el) el.classList.add('active');
      }
    }

    async function launch(appKey) {
      showScreen('loading');
      try {
        const urls = await getUrls();
        const target = urls[appKey];
        if (!target) {
          alert('アプリのURLが設定されていません。管理者に連絡してください。');
          showScreen('screen1');
          return;
        }
        window.location.href = target;
      } catch (e) {
        alert('エラーが発生しました: ' + e.message);
        showScreen('screen1');
      }
    }

    document.getElementById('btnDayTrip').addEventListener('click', () => launch('genbaInfo'));
    document.getElementById('btnStayover').addEventListener('click', () => showScreen('screen2'));
    document.getElementById('btnBooked').addEventListener('click', () => launch('hotelInfo'));
    document.getElementById('btnNotBooked').addEventListener('click', () => launch('hotelFinder'));
    document.getElementById('btnBack').addEventListener('click', () => showScreen('screen1'));

    // Pre-fetch URLs in the background so navigation feels instant
    getUrls().catch(() => {});
  </script>
</body>
</html>
